name: SimpleNotes
options:
  bundleIdPrefix: com.simplenotes
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.4"
  fileTypes:
    "": { buildPhase: none }
  objectVersion: 56
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  SimpleNotes:
    type: application
    platform: macOS
    sources:
      - SimpleNotes
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.simplenotes.app
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: SimpleNotes
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        COMBINE_HIDPI_IMAGES: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES

  SimpleNotesTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - SimpleNotesTests
    dependencies:
      - target: SimpleNotes
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.simplenotes.app.tests
        GENERATE_INFOPLIST_FILE: YES
